<!DOCTYPE html><!--v5.7-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundins</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FGYL42Z2XP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FGYL42Z2XP');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.75);
            --accent: #c0292a;
            --accent-dim: rgba(192,41,42,0.15);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Lato', sans-serif;
            --nav-h: 46px;
        }

        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-weight: 300;
            letter-spacing: 0.02em;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 9999;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid rgba(0,0,0,0.12);
            background: #ffffff;
            z-index: 200;
        }

        .nav-brand {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            flex-shrink: 0;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 201;
        }
        .hamburger span {
            display: block;
            width: 24px; height: 1.5px;
            background: #000000;
            transition: transform 0.3s, opacity 0.3s;
            transform-origin: center;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }

        .nav-links {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav-item { position: relative; }

        .nav-trigger {
            background: none; border: none;
            color: rgba(0,0,0,0.6);
            font-family: var(--font-body);
            font-size: 18px; font-weight: 400;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 8px 14px;
            transition: color 0.25s;
            display: flex; align-items: center; gap: 6px;
        }
        .nav-trigger::after {
            content: '';
            display: block;
            width: 4px; height: 4px;
            border-right: 1px solid currentColor;
            border-bottom: 1px solid currentColor;
            transform: rotate(45deg) translateY(-2px);
            transition: transform 0.25s;
        }
        .nav-item.open .nav-trigger::after { transform: rotate(-135deg) translateY(-2px); }
        .nav-trigger:hover, .nav-item.open .nav-trigger { color: #000000; }

        /* DROPDOWN — aligned to left of trigger, won't overflow */
        .dropdown {
            position: absolute;
            top: 100%; left: 0;
            transform: translateY(-4px);
            min-width: 200px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.12);
            border-top: none;
            border-radius: 0 0 2px 2px;
            padding: 8px 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        .nav-item.open .dropdown { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .submenu-wrapper { position: relative; }
        .submenu-trigger {
            width: 100%; background: none; border: none;
            color: #000000;
            font-family: var(--font-body); font-size: 14px; font-weight: 400;
            letter-spacing: 0.1em; text-align: left;
            padding: 10px 20px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .submenu-trigger::after { content: '›'; font-size: 16px; opacity: 0.5; }
        .submenu-trigger:hover { background: rgba(0,0,0,0.06); }

        .submenu {
            position: absolute; left: 100%; top: 0;
            min-width: 220px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 0 0 2px 2px;
            padding: 8px 0;
            opacity: 0; pointer-events: none;
            transform: translateX(-6px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .submenu-wrapper.open .submenu { opacity: 1; pointer-events: auto; transform: translateX(0); }

        .dropdown-link {
            display: block; padding: 10px 20px;
            color: #000000;
            font-size: 14px; font-weight: 400;
            letter-spacing: 0.1em; text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .dropdown-link:hover { background: rgba(0,0,0,0.06); }

        /* LANG SWITCHER */
        .lang-switcher {
            display: flex; align-items: center;
            margin-left: 16px;
            border-left: 1px solid rgba(0,0,0,0.15);
            padding-left: 16px;
            gap: 2px; flex-shrink: 0;
        }
        .lang-btn {
            background: none; border: none;
            font-family: var(--font-body); font-size: 10px; font-weight: 400;
            letter-spacing: 0.18em; text-transform: uppercase;
            cursor: pointer; padding: 6px 8px; border-radius: 2px;
            transition: color 0.2s, background 0.2s;
            color: rgba(0,0,0,0.5);
        }
        .lang-btn:hover { color: #000000; }
        .lang-btn.active { color: #000000; background: var(--accent-dim); }
        .lang-sep { color: rgba(0,0,0,0.25); font-size: 10px; user-select: none; }

        /* MAIN */
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: calc(var(--nav-h) + 20px) 48px 80px;
            max-width: 960px;
            margin: 0 auto;
        }

        .logo-wrap {
            opacity: 0;
            animation: fadeUp 1s 0.1s forwards;
            margin-bottom: 52px;
        }
        .logo-wrap img {
            width: clamp(180px, 30vw, 400px);
            height: auto;
            opacity: 0.92;
            transition: opacity 0.3s;
            display: block;
        }
        .logo-wrap img:hover { opacity: 1; }

        .hero-headline {
            font-family: var(--font-display);
            font-size: clamp(38px, 5.5vw, 80px);
            font-weight: 300;
            line-height: 1.08;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            max-width: 720px;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.9s 0.3s forwards;
        }
        .hero-headline em { font-style: italic; color: var(--accent); }



        .hero-sub {
            font-size: 18px; line-height: 1.9;
            color: var(--text-secondary);
            max-width: 960px;
            margin-bottom: 56px;
            opacity: 0;
            animation: fadeUp 0.9s 0.55s forwards;
        }

        .contact-block {
            opacity: 0;
            animation: fadeUp 0.9s 0.7s forwards;
        }
        .contact-label {
            font-size: 13px; letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .contact-email {
            font-family: var(--font-display); font-size: 26px;
            font-weight: 300; letter-spacing: 0.04em;
            color: var(--text-primary); text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s, color 0.3s;
            display: block;
            margin-bottom: 16px;
        }
        .contact-email:hover { color: var(--accent); border-bottom-color: var(--accent); }

        .ig-link {
            display: inline-block;
            color: var(--text-secondary);
            transition: color 0.3s;
            line-height: 1;
        }
        .ig-link:hover { color: var(--accent); }

        .credit {
            position: fixed; bottom: 22px;
            left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0;
            animation: fadeIn 1.2s 0.9s forwards;
            white-space: nowrap;
            pointer-events: none;
        }

        .wave-decoration {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 120px; pointer-events: none; opacity: 0.06; overflow: hidden;
        }
        .wave-decoration svg { width: 100%; height: 100%; }

        .i18n-fade { transition: opacity 0.25s ease; }
        .i18n-fade.switching { opacity: 0; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* TABLET */
        @media (max-width: 900px) {
            nav { padding: 0 32px; }
            main { padding: calc(var(--nav-h) + 20px) 32px 80px; }
        }

        /* MOBILE */
        @media (max-width: 680px) {
            nav { padding: 0 20px; }
            .nav-brand { font-size: 18px; letter-spacing: 0.12em; }
            .hamburger { display: flex; }

            .nav-links {
                position: fixed;
                top: 0; right: 0;
                width: min(320px, 85vw);
                height: 100vh;
                background: #1a1a1a;
                border-left: 1px solid var(--border);
                flex-direction: column;
                align-items: flex-start;
                justify-content: flex-start;
                padding: calc(var(--nav-h) + 24px) 0 40px;
                gap: 0;
                transform: translateX(100%);
                transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
                overflow-y: auto;
            }
            .nav-links.mobile-open {
                transform: translateX(0);
                box-shadow: -8px 0 32px rgba(0,0,0,0.5);
            }

            .nav-item { width: 100%; }
            .nav-trigger {
                width: 100%; padding: 14px 24px;
                font-size: 14px;
                border-bottom: 1px solid var(--border);
                justify-content: space-between;
                color: rgba(255,255,255,0.7);
            }
            .nav-trigger:hover, .nav-item.open .nav-trigger { color: #ffffff; }

            .dropdown {
                position: static;
                opacity: 1; pointer-events: auto;
                transform: none;
                background: rgba(255,255,255,0.05);
                border: none; padding: 0;
                display: none;
                border-bottom: 1px solid var(--border);
            }
            .nav-item.open .dropdown { display: block; opacity: 1; }

            .dropdown-link {
                padding: 12px 24px 12px 36px;
                color: rgba(255,255,255,0.85);
                font-weight: 400;
                border-bottom: 1px solid rgba(255,255,255,0.04);
                white-space: normal;
            }
            .dropdown-link:hover { color: #ffffff; background: rgba(255,255,255,0.05); }
            .dropdown-link:last-child { border-bottom: none; }

            .submenu {
                position: static;
                opacity: 1; pointer-events: auto;
                transform: none;
                background: rgba(255,255,255,0.03);
                border: none; padding: 0;
                display: none;
            }
            .submenu-wrapper.open .submenu { display: block; opacity: 1; }
            .submenu .dropdown-link { padding-left: 48px; }
            .submenu-trigger {
                padding: 12px 24px 12px 36px;
                color: rgba(255,255,255,0.85);
                font-weight: 400;
                border-bottom: 1px solid rgba(255,255,255,0.04);
            }
            .submenu-trigger:hover { color: #ffffff; background: rgba(255,255,255,0.05); }

            .lang-switcher {
                width: 100%;
                margin: 16px 0 0;
                border-left: none;
                border-top: 1px solid var(--border);
                padding: 16px 24px;
            }
            .lang-btn { color: rgba(255,255,255,0.5); }
            .lang-btn:hover { color: #ffffff; }
            .lang-btn.active { color: #ffffff; }
            .lang-sep { color: rgba(255,255,255,0.25); }

            main { padding: calc(var(--nav-h) + 20px) 20px 80px; }
            .logo-wrap { margin-bottom: 36px; }
            .logo-wrap img { width: clamp(140px, 55vw, 260px); }
            .hero-sub { max-width: 100%; font-size: 15px; }
            .contact-email { font-size: 20px; }
            .credit { font-size: 9px; bottom: 16px; }
        }

        @media (max-width: 380px) {
            .logo-wrap img { width: 55vw; }
            main { padding-top: calc(var(--nav-h) + 16px); }
        }

        .nav-overlay {
            display: none;
            position: fixed; inset: 0;
            z-index: 199;
        }
        .nav-overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="nav-overlay" id="nav-overlay"></div>

    <nav>
        <a class="nav-brand" href="#">Soundins</a>

        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>

        <div class="nav-links" id="nav-links">

            <div class="nav-item">
                <button class="nav-trigger" data-en="Publications" data-es="Publicaciones">Publications</button>
                <div class="dropdown">
                    <div class="submenu-wrapper">
                        <button class="submenu-trigger">Dither</button>
                        <div class="submenu">
                            <a href="https://soundinsda.github.io/Soundins_website/Publications/Dither_Article/DitherNS_Article.html" target="_blank" class="dropdown-link" data-en="Dither &amp; NS Article" data-es="Artículo Dither &amp; NS">Dither &amp; NS Article</a>
                            <a href="https://soundinsda.github.io/Soundins_website/Publications/Dither/DitherNS_Tool_Main.html" target="_blank" class="dropdown-link" data-en="Dither &amp; NS Benchmark Tool" data-es="Herramienta Dither &amp; NS">Dither &amp; NS Benchmark Tool</a>
                        </div>
                    </div>
                    <a href="https://soundinsda.github.io/Soundins_website/Publications/Sub_Nyquist/index_subNyquist.html" target="_blank" class="dropdown-link" data-en="Beat sub-Nyquist Effect" data-es="Efecto sub-Nyquist">Beat sub-Nyquist Effect</a>
                    <a href="https://www.cursosdesonido.com.ar/blog" target="_blank" class="dropdown-link" data-en="Collaborations" data-es="Colaboraciones">Collaborations</a>
                </div>
            </div>

            <div class="nav-item">
                <button class="nav-trigger" data-en="Plugins" data-es="Plugins">Plugins</button>
                <div class="dropdown">
                    <a href="https://soundinsda.github.io/Soundins_website/Plugins/OmniPass/" class="dropdown-link">OmniPass</a>
                </div>
            </div>

            <div class="nav-item">
                <button class="nav-trigger" data-en="Applications" data-es="Aplicaciones">Applications</button>
                <div class="dropdown">
                    <a href="https://soundinsda.github.io/Soundins_website/Applications/Codalyzer/" class="dropdown-link">Codalyzer</a>
                </div>
            </div>

            <div class="lang-switcher">
                <button class="lang-btn active" id="btn-en">EN</button>
                <span class="lang-sep">/</span>
                <button class="lang-btn" id="btn-es">ES</button>
            </div>

        </div>
    </nav>

    <main>
        <div class="logo-wrap">
            <img id="logo" alt="Soundins">
        </div>

        <h1 class="hero-headline i18n-fade">
            Tools for those who<br><em>care</em> about audio.
        </h1>



        <p class="hero-sub i18n-fade">
            Technical reseach, applications and plugins focused on professional audio engineering.
        </p>

        <div class="contact-block">
            <p class="contact-label i18n-fade" data-en="Get in touch" data-es="Contacto">Get in touch</p>
            <a class="contact-email" href="mailto:contact@soundins.com.ar">contact@soundins.com.ar</a>
            <a href="https://www.instagram.com/soundins_" target="_blank" class="ig-link" aria-label="Instagram">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                </svg>
            </a>
        </div>
    </main>

    <p class="credit">Pablo Panitta</p>

    <div class="wave-decoration" aria-hidden="true">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
            <path d="M0,60 C60,30 120,90 180,60 C240,30 300,90 360,60 C420,30 480,90 540,60 C600,30 660,90 720,60 C780,30 840,90 900,60 C960,30 1020,90 1080,60 C1140,30 1200,90 1260,60 C1320,30 1380,90 1440,60" stroke="white" stroke-width="1.5" fill="none"/>
            <path d="M0,75 C80,45 160,105 240,75 C320,45 400,105 480,75 C560,45 640,105 720,75 C800,45 880,105 960,75 C1040,45 1120,105 1200,75 C1280,45 1360,105 1440,75" stroke="white" stroke-width="0.5" fill="none" opacity="0.4"/>
        </svg>
    </div>

    <script>
        (function () {
            var logo = document.getElementById("logo");
            var paths = ["Soundins.png", "./Soundins.png", "/Soundins.png", "assets/Soundins.png", "images/Soundins.png"];
            function tryNext() {
                if (!paths.length) { logo.style.display = 'none'; return; }
                var p = paths.shift();
                var t = new Image();
                t.onload = function () { logo.src = p; };
                t.onerror = tryNext;
                t.src = p;
            }
            tryNext();
        })();

        document.addEventListener('DOMContentLoaded', function () {

            var navLinks  = document.getElementById('nav-links');
            var hamburger = document.getElementById('hamburger');
            var overlay   = document.getElementById('nav-overlay');

            function isMobile() { return window.innerWidth <= 680; }

            function openMenu() {
                hamburger.classList.add('open');
                navLinks.classList.add('mobile-open');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            function closeMenu() {
                hamburger.classList.remove('open');
                navLinks.classList.remove('mobile-open');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            hamburger.addEventListener('click', function (e) {
                e.stopPropagation();
                navLinks.classList.contains('mobile-open') ? closeMenu() : openMenu();
            });
            overlay.addEventListener('click', closeMenu);

            var navItems    = document.querySelectorAll('.nav-item');
            var subWrappers = document.querySelectorAll('.submenu-wrapper');

            navItems.forEach(function (item) {
                var trigger = item.querySelector('.nav-trigger');
                trigger.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var isOpen = item.classList.contains('open');
                    navItems.forEach(function (i) { i.classList.remove('open'); });
                    subWrappers.forEach(function (s) { s.classList.remove('open'); });
                    if (!isOpen) item.classList.add('open');
                });
            });

            subWrappers.forEach(function (sw) {
                var st = sw.querySelector('.submenu-trigger');
                st.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var isOpen = sw.classList.contains('open');
                    subWrappers.forEach(function (s) { s.classList.remove('open'); });
                    if (!isOpen) sw.classList.add('open');
                });
            });

            document.addEventListener('click', function () {
                navItems.forEach(function (i) { i.classList.remove('open'); });
                subWrappers.forEach(function (s) { s.classList.remove('open'); });
                if (!isMobile()) closeMenu();
            });

            window.addEventListener('resize', function () {
                if (!isMobile()) closeMenu();
            });

            var strings = {
                en: {
                    headline: 'Tools for those who<br><em>care</em> about audio.',
                    sub:      'Plugins, applications, and research focused on professional audio engineering.',
                    contact:  'Get in touch'
                },
                es: {
                    headline: 'Herramientas para los<br><em>apasionados</em> del audio.',
                    sub:      'Investigacion, aplicaciones y plugins enfocados en la ingeniería de audio profesional.',
                    contact:  'Contacto'
                }
            };

            var currentLang = 'en';
            var headline    = document.querySelector('.hero-headline');
            var sub         = document.querySelector('.hero-sub');
            var contactLbl  = document.querySelector('.contact-label');
            var fadables    = document.querySelectorAll('.i18n-fade');

            function setLang(lang) {
                if (lang === currentLang) return;
                currentLang = lang;

                fadables.forEach(function (el) { el.classList.add('switching'); });

                setTimeout(function () {
                    headline.innerHTML     = strings[lang].headline;
                    sub.textContent        = strings[lang].sub;
                    contactLbl.textContent = strings[lang].contact;

                    document.querySelectorAll('[data-' + lang + ']').forEach(function (el) {
                        if (!el.classList.contains('lang-btn') && !el.classList.contains('submenu-trigger')) {
                            el.textContent = el.getAttribute('data-' + lang);
                        }
                    });

                    document.documentElement.lang = lang;
                    fadables.forEach(function (el) { el.classList.remove('switching'); });
                }, 250);

                localStorage.setItem('lang', lang);
                document.getElementById('btn-en').classList.toggle('active', lang === 'en');
                document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            }

            document.getElementById('btn-en').addEventListener('click', function () { setLang('en'); });
            document.getElementById('btn-es').addEventListener('click', function () { setLang('es'); });

            var saved = localStorage.getItem('lang');
            var bl = saved || (navigator.language || navigator.userLanguage || 'en').slice(0, 2).toLowerCase();
            if (bl === 'es') setLang('es');
        });
    </script>
</body>
</html>
